services:
  postgres:
    image: postgres:18.3
    container_name: citation-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wiki}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./infra/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command: >-
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=1536MB
      -c work_mem=32MB
      -c maintenance_work_mem=128MB
      -c wal_compression=on
      -c synchronous_commit=off
      -c max_wal_size=2GB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-wiki}"]
      interval: 1.5s
      timeout: 3s
      retries: 8

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: citation-pipeline
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_DSN: ${POSTGRES_DSN:-dbname=wiki user=postgres password=postgres host=postgres port=5432}
    command: ["python", "main.py"]
    restart: "no"

volumes:
  postgres_data:
